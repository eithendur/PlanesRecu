<VirtualHost *:80>
    ServerName planes.cifpaviles.net
    DocumentRoot /var/www/html/PlanesDistancia/app

    <Directory /var/www/html/PlanesDistancia/app>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/planes_error.log
    CustomLog ${APACHE_LOG_DIR}/planes_access.log combined
</VirtualHost>